# =============================================================================
# Darkstar Configuration
# =============================================================================
# This is the user's production configuration file.
# Structure matches config.default.yaml with user-specific values.
# =============================================================================

# System Metadata
config_version: 2                     # Config format version (for migration tracking)
timezone: "Europe/Stockholm"          # IANA timezone for all schedule calculations

# System Parameters
system:
  system_id: prod
  inverter_profile: null           # Profile: generic | deye | fronius | victron

  # System Profile Toggles (what hardware do you have?)
  has_solar: true         # Enable PV forecasting & solar-related features
  has_battery: true       # Enable battery control & grid arbitrage
  has_water_heater: true  # Enable water heating optimization
  has_ev_charger: false   # Enable EV charging optimization
  grid_meter_type: net    # Meter type: net (single +/- sensor) | dual (separate import/export)

  grid:
    max_power_kw: 8                    # HARD limit: max grid import (cannot be exceeded)
  inverter:
    # NOTE: Currently not implemented. Planned for future inverter clipping feature.
    # See docs/BACKLOG.md "Inverter Clipping Support" for details.
    max_power_kw: 8.0                 # Maximum inverter AC power output
  location:
    latitude: 55.123                # Decimal degrees, positive north (for PV forecasting)
    longitude: 13.123               # Decimal degrees, positive east (for PV forecasting)
  solar_arrays:
    - name: "Main Array"
      azimuth: 180                       # Panel direction: 0°=North, 90°=East, 180°=South, 270°=West
      kwp: 5.0                           # Total DC peak power of PV array in kilowatts
      tilt: 35                           # Panel angle from horizontal: 0°=flat, 90°=vertical

# Battery Specifications
battery:
  capacity_kwh: 34.2
  nominal_voltage_v: 48.0             # Nominal battery voltage (used for Planning)
  min_voltage_v: 46.0                 # Minimum safe voltage (used for Executor safety)
  max_charge_a: 185.0                 # Max charging current (A)
  max_discharge_a: 185.0              # Max discharging current (A)
  max_charge_w: 5000.0                # Max charging power (W)
  max_discharge_w: 5000.0             # Max discharging power (W)
  min_soc_percent: 12
  max_soc_percent: 100                # Planner target ceiling
  # NOTE: Used only in planner/simulation.py. Separate from charge_efficiency
  # which is used by the MILP solver. Derives one-way efficiency as sqrt(roundtrip).
  roundtrip_efficiency_percent: 95.0
  charge_efficiency: 0.92             # Charging efficiency (0-1)

battery_economics:
  battery_cycle_cost_kwh: 0.2      # Degradation cost applied per kWh cycled through the battery


# Water Heating (Global Settings)
# Per-device settings (power, min_kwh_per_day, spacing) are now in water_heaters[] array below
water_heating:
  defer_up_to_hours: 6             # Allow deferring "today's" heating into early tomorrow morning (up to N hours) if cheaper
  block_start_penalty_sek: 3.0     # Penalty per heating start (higher = more consolidated bulk heating)
  comfort_level: 3                 # 1-5 (Economy→Maximum) - controls gap penalty
  spacing_penalty_sek: 0.20        # Soft penalty for frequent starts
  enable_top_ups: true             # Enable spaced top-up heating blocks (vs bulk heating only)


  # Vacation Mode (anti-legionella)
  vacation_mode:
    enabled: false                    # Master switch (HA entity can override when ON)
    anti_legionella_temp_c: 65        # Target temperature for safety cycle
    anti_legionella_interval_days: 7  # Run cycle every N days
    anti_legionella_duration_hours: 3.0  # Duration at power_kw (e.g., 3h * 3kW = 9kWh)
    end_date: ""                      # Vacation mode end date (set by UI/Automation)

  # Advanced Water Heating Tuning (Rev K17)
  # Controls how the solver prioritizes water heating comfort and blocking.
  reliability_penalty_sek: 1000.0   # "Must Have" penalty (missing daily min_kwh)
  block_penalty_sek: 0.50           # "Block Breaker" penalty (discouragues long continuous runs)

# =============================================================================
# Entity-Centric Device Configuration (ARC15)
# =============================================================================
# These sections replace the old `deferrable_loads` array with proper entity
# definitions. Each device type has its own array supporting multiple instances.

# Water Heaters (Array for multiple water heaters)
# ARC15: Replaces deferrable_loads entry for water heating
water_heaters:
  - id: main_tank                    # Unique identifier (slug format)
    name: "Main Water Heater"        # Display name in UI
    enabled: true                    # Master toggle for this heater
    power_kw: 3.0                    # Rated power consumption (kW)
    min_kwh_per_day: 6.0             # Minimum daily energy requirement (kWh)
    max_hours_between_heating: 8     # Max comfort gap between heating cycles
    water_min_spacing_hours: 4       # Minimum gap between heating starts
    sensor: sensor.vvb_power         # Home Assistant entity for power reading
    target_entity: ''                # Thermostat entity for controlling this heater
    type: binary                     # Load type: binary (on/off) or modulating

  # Example: Second water heater (disabled by default)
  # - id: upstairs_tank
  #   name: "Upstairs Water Heater"
  #   enabled: false
  #   power_kw: 3.0
  #   min_kwh_per_day: 4.0
  #   max_hours_between_heating: 12
  #   water_min_spacing_hours: 4
  #   sensor: sensor.wh2_power
  #   target_entity: ''
  #   type: binary

# EV Chargers (Array for multiple electric vehicles)
# ARC15: Replaces deferrable_loads entry for EV charging
# Note: penalty_levels are configured per-EV in the UI (Settings > Parameters)
# They define willingness to pay for charging at different battery levels
ev_chargers:
  - id: ev_charger_1                # Unique identifier (slug format)
    name: "Generic EV"            # Display name in UI
    enabled: false                   # Master toggle for this EV (set true to enable)
    max_power_kw: 11.0               # Maximum charging power (kW)
    battery_capacity_kwh: 82.0       # Battery capacity for SoC calculations (kWh)
    sensor: sensor.tesla_power       # Home Assistant entity for power reading
    soc_sensor: ""                   # EV battery state of charge (%) - Required for smart charging
    plug_sensor: ""                  # EV plug status sensor - Required for smart charging
    type: binary                     # Load type: binary (ON/OFF) only. Variable power control not yet implemented
    nominal_power_kw: 11.0           # Nominal power for load calculations
    departure_time: ""               # Daily departure time "HH:MM" (24-hour). Car must be ready by this time.
    switch_entity: ""                # HA entity to enable/disable smart charging (e.g. switch.ev_charger)
    replan_on_plugin: true           # Re-run planner immediately when this EV plugs in
    replan_on_unplug: false          # Re-run planner immediately when this EV unplugs

  # Example: Second EV (disabled by default)
  # - id: ev_charger_2
  #   name: "Fiat 500e"
  #   enabled: false
  #   max_power_kw: 7.4
  #   battery_capacity_kwh: 42.0
  #   sensor: sensor.fiat_power
  #   type: variable
  #   nominal_power_kw: 7.4
  #   departure_time: ""
  #   switch_entity: ""
  #   replan_on_plugin: true
  #   replan_on_unplug: false

# S-Index Configuration (Risk & Safety Strategy)
s_index:
  mode: "probabilistic"            # Options: probabilistic | dynamic
  static_factor:                   # Used when mode=static
  base_factor: 1.1                 # Starting point for dynamic calculations
  max_factor: 1.5                  # Upper bound clamp for dynamic mode
  pv_deficit_weight: 0.2           # Weight for PV/load deficit contribution
  temp_weight: 0.3                 # Weight for temperature adjustment
  temp_baseline_c: 15.0            # Baseline temperature (no adjustment)
  temp_cold_c: -10.0               # Temperature where adjustment reaches 100%
  s_index_horizon_days: 4          # Number of days ahead to evaluate (integer)
  risk_appetite: 3                 # 1-5 scale (1=safe, 3=neutral, 5=gambler)
  max_safety_buffer_percent: 20    # Max reserve capacity to hold at 100% deficit (default 40%)

export:
  enable_export: true              # Master switch for grid export (if false, planner enforces 0 export)

# Manual Planning Defaults
manual_planning:
  charge_target_percent: 95        # Cap for manual charge slots
  export_target_percent: 35        # Floor target when manually scheduling export

# Debug & Telemetry (developer settings)
debug:
  enable_planner_debug: false          # Enable verbose planner logging
  sample_size: 30                      # Sample size for debug output charts

# Automation (Background Scheduler)
automation:
  enable_scheduler: true               # Enable automatic schedule regeneration
  schedule:
    every_minutes: 30                  # How often to regenerate schedule
    jitter_minutes: 0                  # Random delay to avoid thundering herd
  ml_training:
    enabled: true                      # Enable automatic ML model retraining
    run_days: [1, 4]                   # Days of week to train (0=Mon, 6=Sun)
    run_time: "03:00"                  # Time of day to run training (HH:MM)

# Learning Engine (Aurora Reflex)
# Learning Engine Configuration
# The learning system has two main components:
# 1. Telemetry: Records planner decisions, forecasts, and actual outcomes to SQLite
# 2. Reflex: Tunes physical/policy parameters (S-Index, PV confidence, battery cost) based on safety/ROI analysis
learning:
  enable: true                         # Master switch: enables telemetry storage and learning features
  sqlite_path: "data/planner_learning.db"  # Database path for storing planner telemetry (observations, forecasts, plans, metrics)
  horizon_days: 3                      # Number of days of Aurora ML forecasts to generate (2-7 days, affects CPU usage)
  min_improvement_threshold: 0.015     # Minimum improvement (0-1 scale) required before applying learned adjustments (prevents noise)
  reflex_enabled: true                 # Enable Reflex: tunes physical/policy parameters (S-Index, PV confidence, battery cost, capacity) based on safety/confidence/ROI/capacity analysis
  min_sample_threshold: 2              # Minimum data points required before applying learned adjustments (prevents premature tuning with insufficient data)

  # Rate Limits for Aurora Reflex Parameter Tuning
  # These limits prevent instability by capping how much each parameter can change per day
  # Reflex analyzes historical data and gradually adjusts parameters within these bounds
  max_daily_param_change:
    pv_confidence_percent: 1.0         # Max daily change to PV forecast confidence (percentage points per day)
    load_safety_margin_percent: 1.0    # Max daily change to load forecast safety margin (percentage points per day)
    battery_use_margin_sek: 0.02       # Max daily change to battery use margin (SEK per day)
    export_profit_margin_sek: 0.02     # Max daily change to export profit margin (SEK per day)
    s_index_base_factor: 0.05          # Max daily change to S-Index base factor (absolute value per day, prevents aggressive reserve changes)
    s_index_pv_deficit_weight: 0.1     # Max daily change to S-Index PV deficit weight (absolute value per day)
    s_index_temp_weight: 0.1           # Max daily change to S-Index temperature weight (absolute value per day)
    future_price_guard_buffer_sek: 0.05  # Max daily change to future price guard buffer (SEK per day)

# Nordpool API Configuration (electricity prices)
nordpool:
  price_area: "SE4"                    # Nordpool bidding zone (SE1-SE4, NO1-NO5, DK1-DK2, FI, etc.)
  currency: "SEK"                      # Price currency
  resolution_minutes: 15               # Slot resolution (15, 30, or 60)

# Pricing Configuration (your electricity costs)
pricing:
  vat_percent: 25.0                    # VAT percentage on electricity
  grid_transfer_fee_sek: 0.2456        # Grid operator transfer fee per kWh
  energy_tax_sek: 0.439                # Energy tax per kWh

# Forecasting Adjustments (Aurora ML tuning)
forecasting:
  active_forecast_version: "aurora"
  pv_confidence_percent: 83.0          # PV forecast scaling (100 = trust forecast fully)
  load_safety_margin_percent: 117.0    # Load forecast scaling (>100 = expect more load)

# Grid Limits (Soft Constraint)
# This is a SOFT limit with penalty - planner prefers to stay under but can breach if needed.
# See system.grid.max_power_kw for the HARD limit (cannot be exceeded).
# NOTE: Soft limit feature exists in KeplerConfig but not wired to config.
# Planned for effekttariff feature. Currently unused.
grid:
  import_limit_kw: 11.0                # Soft limit for effekttariff (breached with high penalty)

# Kepler Solver (MILP optimizer settings)
kepler:
  ramping_cost_sek_per_kw: 0.01        # Penalty for power changes between slots (reduces sawtooth)
  curtailment_penalty_sek: 0.1         # Penalty for wasting available solar power

# =============================================================================
# Home Assistant Integration
# =============================================================================

# Input Sensors (entities Darkstar READS from Home Assistant)
input_sensors:
  # Context sensors for ML features
  alarm_state: ""        # Alarm panel for occupancy detection (ML feature)
  vacation_mode: ""     # Vacation mode toggle (reduces load forecasts)

  # Core energy sensors (real-time power)
  battery_soc: ""           # Current battery state of charge (%)
  pv_power: ""             # Current PV production (W or kW)
  load_power: ""         # Current load consumption (W or kW)
  battery_power: ""   # Current battery power (+ discharge, - charge)
  grid_power: ""         # Current grid power (+ import, - export) (Used if meter_type=net)
  grid_import_power: ""    # Current grid import power (W/kW) (Used if meter_type=dual)
  grid_export_power: ""    # Current grid export power (W/kW) (Used if meter_type=dual)

  # Cumulative energy sensors (totals)
  total_battery_charge: ""      # Cumulative battery charge (kWh)
  total_battery_discharge: "" # Cumulative battery discharge (kWh)
  total_grid_export: ""          # Cumulative grid export (kWh)
  total_grid_import: ""          # Cumulative grid import (kWh)
  total_load_consumption: ""  # Cumulative load (kWh)
  total_pv_production: ""           # Cumulative PV production (kWh)

# Executor (control loop that WRITES to Home Assistant)
executor:
  enabled: true                                  # Enable executor control loop
  shadow_mode: true                              # Log actions but don't execute (for testing)
  interval_seconds: 60                           # How often to run (default: 1 minute)
  pause_reminder_minutes: 30                     # Notify if paused longer than this
  history_retention_days: 30                     # Keep execution history for N days
  # HTTP Timeout: All Home Assistant API calls use a 5-second timeout with automatic
  # retry (3 attempts) for transient network failures. This prevents the executor from
  # freezing when HA becomes unresponsive (e.g., Fronius inverter via Modbus issues).

  # Toggle entities (read by executor to check if enabled)
  automation_toggle_entity: ""           # Master enable/disable switch
  manual_override_entity: ""    # Manual override active flag
  # Inverter Control Entities (executor WRITES to these)
  inverter:
    work_mode: ""                     # Inverter mode selector
    soc_target: ""                 # Target maintenance level. Acts as a discharge floor (won't discharge below this %) AND a grid charge target (won't charge above this % from grid). Required for inverters like Deye (behavior for other inverters unknown).
    work_mode_export: "Export First"                                # Value for export mode
    work_mode_zero_export: "Zero Export To CT"                      # Value for zero-export mode
    grid_charging_enable: ""     # Enable/disable grid charging
    max_charge_current: ""     # Max charge current (A)
    max_discharge_current: ""  # Max discharge current (A)
    grid_max_export_power: ""           # Max grid export power (Watts)
    grid_max_export_power_switch: ""    # Switch entity to enable/disable grid export limit

    # Control Unit Configuration (REV E3)
    control_unit: "A"                                                 # "A" (Amperes) or "W" (Watts)
    max_charge_power: ""                                       # Entity for max charge power (W)
    max_discharge_power: ""                                    # Entity for max discharge power (W)

    # Profile-specific composite entities (e.g., Sungrow ems_mode, forced_charge_discharge_cmd)
    custom_entities: {}

  # Controller Parameters (electrical conversion constants)
  controller:
    inverter_ac_limit_kw: 8.8          # Max AC power output of inverter
    min_charge_a: 10.0                 # Minimum meaningful charge current (A)
    round_step_a: 5.0                  # Round current commands to nearest X amps
    write_threshold_a: 5.0             # Only write if change exceeds X amps

    # Watt-based Control Limits (used if control_unit="W")
    min_charge_w: 500.0                # Minimum meaningful charge power (W)
    round_step_w: 100.0                # Round power commands to nearest X watts
    write_threshold_w: 100.0           # Only write power if change exceeds X watts (EEPROM protection)

  # Water Heater Control
  # The executor controls your water heater by setting a target temperature.
  # These temps define the operating modes:
  water_heater:
    temp_off: 40       # Idle mode (legionella-safe minimum)
    temp_normal: 60    # Scheduled heating target (used by planner)
    temp_boost: 70     # Manual boost button (Dashboard/Executor)
    temp_max: 85       # PV dump target + safety limit (never exceeded)

  # Notifications (via Home Assistant notify service)
  notifications:
    service: ""  # HA notify service to use
    on_charge_start: true              # Notify when grid charging starts
    on_charge_stop: false              # Notify when grid charging stops
    on_export_start: true              # Notify when export/discharge starts
    on_export_stop: true               # Notify when export/discharge stops
    on_water_heat_start: true          # Notify when water heating starts
    on_water_heat_stop: false          # Notify when water heating stops
    on_ev_charge_start: true           # Notify when EV charging starts
    on_ev_charge_stop: false           # Notify when EV charging stops
    on_soc_target_change: false        # Notify when SoC target changes
    on_override_activated: true        # Notify when manual override triggers
    on_error: true                     # Notify on executor errors

  # Override Configuration (real-time safety triggers)
  # These settings control when the executor overrides the planned schedule
  # to protect the battery or utilize excess energy.
  override:
    # Export prevention floor: Stop exporting if SoC drops to this level.
    # This is a safety buffer ABOVE your min_soc to prevent excessive discharge.
    # Example: If min_soc=5% and low_soc_export_floor=15%, export stops at 15%
    # but emergency charge only triggers if SoC drops BELOW 5%.
    low_soc_export_floor: 20           # SoC % at which to prevent planned exports

    # Excess PV threshold: Minimum surplus PV power (kW) to trigger water heating.
    # When PV production exceeds load by this amount AND battery is >95%,
    # the executor will heat water to dump free solar energy.
    excess_pv_threshold_kw: 2.0        # Surplus PV (kW) needed to trigger PV dump

# =============================================================================
# UI Settings
# =============================================================================

# Dashboard Settings
dashboard:
  auto_refresh_enabled: true           # Auto-refresh dashboard schedule display

# Theme Settings
ui:
  theme: "Material Design Colors"      # Color theme name
  theme_accent_index: 3                # Accent color index (0-based)
