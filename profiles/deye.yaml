# ============================================================
# Inverter Profile: Deye / SunSynk
# Schema Version: 2
# ============================================================

metadata:
  name: "deye"
  version: "2.0.0"
  schema_version: 2
  description: "Deye and SunSynk hybrid inverters using Amps-based control"
  supported_brands:
    - "Deye"
    - "SunSynk"
    - "Sol-Ark"
    - "Turbo Energy"

entities:
  work_mode:
    default_entity: "select.inverter_work_mode"
    domain: "select"
    category: "system"
    description: "Inverter work mode selector"
    required: true

  grid_charging_enable:
    default_entity: "switch.inverter_battery_grid_charging"
    domain: "switch"
    category: "system"
    description: "Grid charging on/off switch"
    required: true

  soc_target:
    default_entity: "input_number.master_soc_target"
    domain: "input_number"
    category: "battery"
    description: "Battery SoC target percentage"
    required: true

  max_charge_current:
    default_entity: "number.inverter_battery_max_charging_current"
    domain: "number"
    category: "battery"
    description: "Maximum battery charging current (Amps)"
    required: true

  max_discharge_current:
    default_entity: "number.inverter_battery_max_discharging_current"
    domain: "number"
    category: "battery"
    description: "Maximum battery discharge current (Amps)"
    required: true

  grid_max_export_power:
    default_entity: "number.inverter_export_surplus_power"
    domain: "number"
    category: "battery"
    description: "Grid export power limit (Watts)"
    required: false

modes:
  charge:
    description: "Grid charge — Force charge battery from AC grid"
    actions:
      - entity: "work_mode"
        value: "Zero Export To CT"
      - entity: "grid_charging_enable"
        value: on
      - entity: "max_charge_current"
        value: "{{charge_value}}"
      - entity: "soc_target"
        value: "{{soc_target}}"

  export:
    description: "Grid export — Discharge battery to grid for profit"
    actions:
      - entity: "work_mode"
        value: "Export First"
      - entity: "grid_charging_enable"
        value: off
      - entity: "max_discharge_current"
        value: "{{max_discharge}}"
      - entity: "grid_max_export_power"
        value: "{{export_power_w}}"
      - entity: "soc_target"
        value: "{{soc_target}}"

  self_consumption:
    description: "Self consumption — PV to battery and house, no grid export"
    actions:
      - entity: "work_mode"
        value: "Zero Export To CT"
      - entity: "grid_charging_enable"
        value: off
      - entity: "soc_target"
        value: "{{soc_target}}"
      - entity: "max_discharge_current"
        value: "{{max_discharge}}"

  idle:
    description: "Idle / Hold — Block discharge, preserve battery"
    actions:
      - entity: "work_mode"
        value: "Zero Export To CT"
      - entity: "grid_charging_enable"
        value: off
      - entity: "max_discharge_current"
        value: 0
      - entity: "max_charge_current"
        value: "{{max_charge}}"
      - entity: "soc_target"
        value: "{{soc_target}}"

behavior:
  control_unit: "A"
  min_charge_a: 10.0
  round_step_a: 5.0
  write_threshold_a: 5.0
  mode_settling_ms: 100
