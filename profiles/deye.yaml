# Deye / SunSynk Inverter Profile
# This profile defines the standard behavior for Deye, SunSynk, and rebrands (Sol-Ark, Turbo Energy).

metadata:
  name: "deye"
  version: "1.0.0"
  description: "Native support for Deye, SunSynk and Sol-Ark hybrid inverters"
  supported_brands:
    - "Deye"
    - "SunSynk" #Not verified
    - "Sol-Ark" #Not verified
    - "Turbo Energy" #Not verified
  author: "@ergetie"
  created_at: "2026-02-05"
  updated_at: "2026-02-05"

capabilities:
  grid_charging_control: true
  watts_based_control: false
  service_call_mode: false
  separate_grid_charging_switch: true
  supports_export_mode: true
  supports_zero_export: true
  supports_self_consumption: true
  supports_soc_target: true
  supports_grid_export_limit: true
  supports_force_discharge: false

entities:
  # These are defaults, users usually override them in config.yaml
  required:
    work_mode_entity: "select.deye_work_mode"
    soc_target_entity: "number.deye_battery_soc_limit_1"
    grid_charging_entity: "switch.deye_grid_charging_1"

  optional:
    max_charging_current_entity: "number.deye_battery_max_charge_current"
    max_discharging_current_entity: "number.deye_battery_max_discharge_current"
    grid_max_export_power_entity: "number.deye_grid_export_limit"

modes:
  export:
    value: "Export First"
    description: "Battery discharge to grid enabled"
    requires_grid_charging: false

  zero_export:
    value: "Zero Export To CT"
    description: "Zero export to grid (self-consumption only)"
    requires_grid_charging: false

  self_consumption:
    value: "Self Consumption"
    description: "Prioritize local consumption"
    requires_grid_charging: false

  charge_from_grid:
    value: null                            # Uses zero_export + grid_charging_entity=ON
    description: "Charge battery from grid"
    requires_grid_charging: true

  idle:
    value: null
    description: "Idle via zero export and minimal settings"
    requires_grid_charging: false

behavior:
  control_unit: "A"
  min_charge_a: 10.0
  round_step_a: 5.0
  write_threshold_a: 5.0
  soc_target_is_discharge_floor: true
  soc_target_is_charge_ceiling: true
  inverter_ac_limit_kw: 8.8

defaults:
  battery:
    nominal_voltage_v: 48.0
    min_voltage_v: 46.0

  executor:
    controller:
      inverter_ac_limit_kw: 8.8
      min_charge_a: 10.0
      round_step_a: 5.0
      write_threshold_a: 5.0

  suggested_entities:
    work_mode_entity: "select.deye_work_mode"
    soc_target_entity: "number.deye_battery_soc_limit_1"
    grid_charging_entity: "switch.deye_grid_charging_1"
    max_charging_current_entity: "number.deye_battery_max_charge_current"
    max_discharging_current_entity: "number.deye_battery_max_discharge_current"
    grid_max_export_power_entity: "number.deye_grid_export_limit"
