# ============================================================
# Inverter Profile: Solinteg
# Schema Version: 2
# ============================================================
#
# Tested hardware: Solinteg MHT-25-50 (also sold as "Reco" in Sweden and other markets)
# Integration: solax_modbus HACS custom component (Solinteg plugin)
#
# Working mode strategy — 3-way dynamic switching (EEPROM-safe):
#
#   General         → self_consumption  (PV→load→battery in real-time, zero import)
#   Economic        → idle              (TOU-hold, battery preserved for planned slots)
#   Charge-Discharge → charge / export  (Darkstar controls exact power via register 50207)
#
#   EEPROM safety: actions.py deduplicates writes — reads current entity state before
#   each write and skips if already matching. Actual EEPROM writes occur only on genuine
#   mode transitions (~4-6/day). No manual pre-configuration of working_mode required.
#
# Register 50207 (charge_discharge_power_target) — RAM-backed, safe for frequent writes:
#   -500 = -5.00 kW charge from grid    (Charge-Discharge mode, charge slot)
#   +500 = +5.00 kW discharge to grid   (Charge-Discharge mode, export slot)
#   NOTE: Solinteg polarity is INVERTED vs other inverters — positive = discharge, negative = charge
#   (not written in General/Economic modes — inverter firmware handles power flow)
#
# Control model difference vs other inverters:
#   Deye, Fronius, Sungrow: separate charge entity + discharge entity (both positive)
#   Solinteg: single bidirectional register (positive = charge, negative = discharge)
#             + working_mode switching for autonomous self-consumption modes
#
# Setup steps:
#   1. Install solax_modbus HACS integration with Solinteg plugin
#   2. Set profile: solinteg in Darkstar config.yaml
#   3. Override entity IDs in executor.inverter if your prefix differs from "inverter":
#        work_mode: select.reco_inverter_working_mode
#        charge_discharge_power: number.reco_inverter_battery_charge_discharge_power_target

metadata:
  name: "solinteg"
  version: "1.0.0"
  schema_version: 2
  description: >
    Solinteg hybrid inverters (also sold as Reco, and other OEM brands).
    Dynamically switches between General (self_consumption), Economic (idle), and
    Charge-Discharge (charge/export) modes. Write deduplication in actions.py ensures
    EEPROM register 50000 is only written on genuine mode transitions (~4-6/day).
  supported_brands:
    - "Solinteg"
    - "Reco"
    - "Solinteg MHT"

entities:
  # work_mode: written by Darkstar on mode transitions only.
  # actions.py reads current state before each write and skips if already matching,
  # so EEPROM register 50000 is only hit when the working mode actually changes.
  work_mode:
    default_entity: "select.inverter_working_mode"
    domain: "select"
    category: "system"
    description: >
      Inverter working mode (EEPROM register 50000).
      Darkstar writes this only at mode transitions (General/Economic/Charge-Discharge).
      Write deduplication ensures no EEPROM wear from redundant writes.
    required: true

  # Primary control entity — bidirectional RAM register, safe for frequent writes.
  # Positive = charge (W/10), negative = discharge (W/10), 0 = self-consumption.
  charge_discharge_power:
    default_entity: "number.inverter_battery_charge_discharge_power_target"
    domain: "number"
    category: "battery"
    description: >
      Bidirectional power target register (x0.01 kW, RAM register 50207).
      Positive = charge from grid, negative = discharge to grid/load, 0 = self-consumption.
      Range: -20000 to +20000. Write value = watts / 10.
    required: true

  soc_min_on_grid:
    default_entity: "number.inverter_battery_soc_min_on_grid"
    domain: "number"
    category: "battery"
    description: >
      Hardware-level minimum battery SoC on grid (%).
      Set to 10% as a safety backstop independent of Darkstar's software SoC floor.
      Not written by Darkstar mode actions.
    required: false

modes:
  charge:
    description: >
      Switch to Charge-Discharge mode, then force charge battery from AC grid.
      work_mode write is deduplicated — EEPROM only hit on actual transitions.
    actions:
      - entity: "work_mode"
        value: "Charge-Discharge"
        settle_ms: 2000
      - entity: "charge_discharge_power"
        value: "{{charge_value}}"
        scale: -0.1       # W → NEGATIVE register (charge direction on Solinteg)
        settle_ms: 3000

  export:
    description: >
      Switch to Charge-Discharge mode, then discharge battery to cover load and export to grid.
      work_mode write is deduplicated — EEPROM only hit on actual transitions.
    actions:
      - entity: "work_mode"
        value: "Charge-Discharge"
        settle_ms: 2000
      - entity: "charge_discharge_power"
        value: "{{export_with_load_w}}"
        scale: 0.1        # W → POSITIVE register (discharge direction on Solinteg)
        settle_ms: 3000

  self_consumption:
    description: >
      Switch to General mode — inverter autonomously routes PV to load then battery.
      Real-time response: battery covers load instantly when PV drops (clouds, evening).
      No power register write needed; inverter firmware handles MPPT and load balancing.
    actions:
      - entity: "work_mode"
        value: "General"
        settle_ms: 3000

  idle:
    description: >
      Switch to Economic mode — TOU-based hold.
      Inverter preserves battery according to its time-of-use schedule.
      Darkstar's MILP planner owns the strategic decisions; Economic provides
      a conservative default when no active charge or discharge is commanded.
    actions:
      - entity: "work_mode"
        value: "Economic"
        settle_ms: 3000

behavior:
  control_unit: "W"
  min_charge_w: 100.0
  round_step_w: 100.0
  write_threshold_w: 100.0
  mode_settling_ms: 3000

# ============================================================
# NOTES
# ============================================================
#
# 1. BIDIRECTIONAL REGISTER:
#    Unlike all other Darkstar profiles, Solinteg uses a single bidirectional
#    register rather than separate charge and discharge entities.
#    The sign encodes direction: positive = charge, negative = discharge.
#
# 2. CHARGE MODE:
#    charge_value (W) * -0.1 = register value (negative = charge on Solinteg).
#    Example: 5000 W → register -500 → 5.00 kW charge from grid.
#
# 3. EXPORT MODE:
#    export_with_load_w accounts for both home load and planned grid export.
#    export_with_load_w (W) * 0.1 = register value (positive = discharge on Solinteg).
#    Example: 3 kW load + 5 kW export target = register +800 → 8.00 kW discharge.
#
# 4. SELF_CONSUMPTION / IDLE:
#    self_consumption → General mode: inverter autonomously handles PV→load→battery
#    in real-time via MPPT. Battery discharges to cover load when PV is insufficient
#    (clouds, evening), achieving zero grid import as long as battery capacity allows.
#    idle → Economic mode: TOU-based management. Battery preserved for planned slots.
#
# 5. EEPROM PROTECTION:
#    Register 50000 (working_mode) is written by this profile, but actions.py
#    deduplicates every write: it reads the current entity state and skips the
#    HA service call if the value already matches. Actual EEPROM writes only occur
#    at genuine mode transitions (e.g., General → Charge-Discharge at start of a
#    charge slot), approximately 4-6 times per day.
#
# 6. SETTLING TIME:
#    3000ms settling is conservative and appropriate for Solinteg firmware.
#    The register is RAM-backed so writes take effect immediately, but the
#    inverter's internal control loop needs time to respond.
