# ============================================================
# Inverter Profile: Sungrow
# Schema Version: 2
# ============================================================

metadata:
  name: "sungrow"
  version: "2.0.0"
  schema_version: 2
  description: "Sungrow hybrid inverters using Watts-based control with composite modes"
  supported_brands:
    - "Sungrow"

entities:
  work_mode:
    default_entity: "select.ems_mode"
    domain: "select"
    category: "system"
    description: "EMS Mode selector (primary operating mode)"
    required: true

  forced_charge_discharge_cmd:
    default_entity: "select.battery_forced_charge_discharge"
    domain: "select"
    category: "system"
    description: "Forced charge/discharge command selector"
    required: true

  max_charge_power:
    default_entity: "number.battery_max_charge_power"
    domain: "number"
    category: "battery"
    description: "Maximum battery charging power (Watts)"
    required: true

  max_discharge_power:
    default_entity: "number.battery_max_discharge_power"
    domain: "number"
    category: "battery"
    description: "Maximum battery discharge power (Watts)"
    required: true

  export_power_limit:
    default_entity: "number.export_power_limit"
    domain: "number"
    category: "battery"
    description: "Grid export power limit (Watts)"
    required: false

  export_power_limit_switch:
    default_entity: "switch.export_power_limit"
    domain: "switch"
    category: "battery"
    description: "Grid export power limit switch"
    required: false

  forced_charge_discharge_power:
    default_entity: "number.battery_forced_charge_discharge_power"
    domain: "number"
    category: "battery"
    description: "Forced mode charge/discharge power cap (Watts)"
    required: true

modes:
  charge:
    description: "Grid charge — Force charge battery from AC grid"
    actions:
      - entity: "work_mode"
        value: "Forced mode"
      - entity: "forced_charge_discharge_cmd"
        value: "Forced charge"
      - entity: "forced_charge_discharge_power"
        value: "{{charge_value}}"
      - entity: "max_charge_power"
        value: "{{charge_value}}"
      - entity: "max_discharge_power"
        value: "{{max_discharge}}"

  export:
    description: "Grid export — Force discharge battery to grid"
    actions:
      - entity: "work_mode"
        value: "Forced mode"
      - entity: "forced_charge_discharge_cmd"
        value: "Forced discharge"
      - entity: "forced_charge_discharge_power"
        value: "{{max_discharge}}"
      - entity: "max_discharge_power"
        value: "{{discharge_value}}"
      - entity: "export_power_limit"
        value: "{{export_power_w}}"
      - entity: "export_power_limit_switch"
        value: "on"

  self_consumption:
    description: "Self consumption — Normal PV to battery and house"
    actions:
      - entity: "work_mode"
        value: "Self-consumption mode (default)"
      - entity: "forced_charge_discharge_cmd"
        value: "Stop (default)"
      - entity: "forced_charge_discharge_power"
        value: 0
      - entity: "max_discharge_power"
        value: "{{max_discharge}}"

  idle:
    description: "Idle / Hold — Block discharge, preserve battery"
    actions:
      - entity: "work_mode"
        value: "Self-consumption mode (default)"
      - entity: "forced_charge_discharge_cmd"
        value: "Stop (default)"
      - entity: "forced_charge_discharge_power"
        value: 0
      - entity: "max_discharge_power"
        value: 10

behavior:
  control_unit: "W"
  min_charge_w: 10.0
  round_step_w: 100.0
  write_threshold_w: 100.0
  mode_settling_ms: 100

# ============================================================
# IMPORTANT NOTES (from mkaiser/Sungrow-SHx-Inverter-Modbus-Home-Assistant)
# ============================================================
#
# 1. COMPOSITE MODE ARCHITECTURE:
#    Sungrow uses two selectors together:
#    - work_mode (EMS Mode): "Self-consumption mode (default)" or "Forced mode"
#    - forced_charge_discharge_cmd: "Stop (default)", "Forced charge", or "Forced discharge"
#
# 2. POWER VALUES:
#    - Minimum power value is 10W (inverter enforces this as lowest valid setting)
#    - Forced Power must be set in multiples of 10W
#    - In forced modes, always set the corresponding max_*_power to ensure
#      it doesn't cap the forced power
#
# 3. IDLE MODE BEHAVIOR:
#    Idle mode uses max_discharge_power=10W (minimum) instead of 0W to
#    prevent battery discharge while still allowing PV charging.
#
# 4. SELF-CONSUMPTION MODE:
#    In "Self-consumption mode (default)", the forced_charge_discharge_cmd
#    is completely ignored regardless of its current value. The battery
#    charges from excess PV and discharges to meet home load demand.
#
# 5. MAX DISCHARGE POWER CAP:
#    max_charge_power and max_discharge_power act as caps on battery power
#    in BOTH Self-consumption and Forced modes. Set these high (9000W)
#    when you want full power availability.
#
# 6. EXPORT LIMIT:
#    Export limit works independently of EMS mode - it is active in all
#    modes when the switch is on. Export is controlled via export_power_limit
#    entity, NOT via max_discharge_power.
#
# 7. FORCED MODE BEHAVIOR:
#    In "Forced mode", the battery responds to forced_charge_discharge_cmd
#    and forced_charge_discharge_power settings. This is used for grid
#    charge and grid export actions.
