# ============================================================
# Inverter Profile: Sungrow
# Schema Version: 2
# ============================================================

metadata:
  name: "sungrow"
  version: "2.0.0"
  schema_version: 2
  description: "Sungrow hybrid inverters using Watts-based control with composite modes"
  supported_brands:
    - "Sungrow"

entities:
  work_mode:
    default_entity: "select.ems_mode"
    domain: "select"
    category: "system"
    description: "EMS Mode selector (primary operating mode)"
    required: true

  forced_charge_discharge_cmd:
    default_entity: "select.battery_forced_charge_discharge"
    domain: "select"
    category: "system"
    description: "Forced charge/discharge command selector"
    required: true

  max_charge_power:
    default_entity: "number.battery_max_charge_power"
    domain: "number"
    category: "battery"
    description: "Maximum battery charging power (Watts)"
    required: true

  max_discharge_power:
    default_entity: "number.battery_max_discharge_power"
    domain: "number"
    category: "battery"
    description: "Maximum battery discharge power (Watts)"
    required: true

  export_power_limit:
    default_entity: "number.export_power_limit"
    domain: "number"
    category: "battery"
    description: "Grid export power limit (Watts)"
    required: false

  export_power_limit_switch:
    default_entity: "switch.export_power_limit"
    domain: "switch"
    category: "battery"
    description: "Grid export power limit switch"
    required: false

  forced_charge_discharge_power:
    default_entity: "number.battery_forced_charge_discharge_power"
    domain: "number"
    category: "battery"
    description: "Forced mode charge/discharge power cap (Watts)"
    required: true

modes:
  charge:
    description: "Grid charge — Force charge battery from AC grid"
    actions:
      - entity: "work_mode"
        value: "Forced mode"
      - entity: "forced_charge_discharge_cmd"
        value: "Forced charge"
      - entity: "forced_charge_discharge_power"
        value: "{{charge_value}}"
      - entity: "max_charge_power"
        value: "{{charge_value}}"
      - entity: "max_discharge_power"
        value: "{{max_discharge}}"

  export:
    description: "Grid export — Force discharge battery to grid"
    actions:
      - entity: "work_mode"
        value: "Forced mode"
      - entity: "forced_charge_discharge_cmd"
        value: "Forced discharge"
      - entity: "forced_charge_discharge_power"
        value: "{{max_discharge}}"
      - entity: "max_discharge_power"
        value: "{{discharge_value}}"
      - entity: "export_power_limit"
        value: "{{export_power_w}}"
      - entity: "export_power_limit_switch"
        value: "on"

  self_consumption:
    description: "Self consumption — Normal PV to battery and house"
    actions:
      - entity: "work_mode"
        value: "Self-consumption mode (default)"
      - entity: "forced_charge_discharge_cmd"
        value: "Stop (default)"
      - entity: "forced_charge_discharge_power"
        value: 0
      - entity: "max_discharge_power"
        value: "{{max_discharge}}"

  idle:
    description: "Idle / Hold — Block discharge, preserve battery"
    actions:
      - entity: "work_mode"
        value: "Self-consumption mode (default)"
      - entity: "forced_charge_discharge_cmd"
        value: "Stop (default)"
      - entity: "forced_charge_discharge_power"
        value: 0
      - entity: "max_discharge_power"
        value: 10

behavior:
  control_unit: "W"
  min_charge_w: 10.0
  round_step_w: 100.0
  write_threshold_w: 100.0
  mode_settling_ms: 100
