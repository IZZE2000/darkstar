# ============================================================
# Inverter Profile: Generic
# Schema Version: 2
# ============================================================

metadata:
  name: "generic"
  version: "2.0.0"
  schema_version: 2
  description: "Generic inverter profile — configure entities manually"
  supported_brands:
    - "Generic"
    - "Other"

entities:
  work_mode:
    default_entity: null
    domain: "select"
    category: "system"
    description: "Inverter work mode selector"
    required: true

  grid_charging_enable:
    default_entity: null
    domain: "switch"
    category: "system"
    description: "Grid charging on/off switch"
    required: true

  soc_target:
    default_entity: null
    domain: "number"
    category: "battery"
    description: "Battery SoC target percentage"
    required: false

  max_charge_current:
    default_entity: null
    domain: "number"
    category: "battery"
    description: "Maximum battery charging current (Amps)"
    required: true

  max_discharge_current:
    default_entity: null
    domain: "number"
    category: "battery"
    description: "Maximum battery discharge current (Amps)"
    required: true

  max_charge_power:
    default_entity: null
    domain: "number"
    category: "battery"
    description: "Maximum battery charging power (Watts)"
    required: false

  max_discharge_power:
    default_entity: null
    domain: "number"
    category: "battery"
    description: "Maximum battery discharge power (Watts)"
    required: false

modes:
  charge:
    description: "Grid charge — charge battery from AC grid"
    actions:
      - entity: "work_mode"
        value: "CONFIGURE_ME"
      - entity: "grid_charging_enable"
        value: true
      - entity: "max_charge_current"
        value: "{{charge_value}}"
      - entity: "soc_target"
        value: "{{soc_target}}"

  export:
    description: "Grid export — discharge battery to grid"
    actions:
      - entity: "work_mode"
        value: "CONFIGURE_ME"
      - entity: "grid_charging_enable"
        value: false
      - entity: "max_discharge_current"
        value: "{{discharge_value}}"

  self_consumption:
    description: "Self consumption — normal operation"
    actions:
      - entity: "work_mode"
        value: "CONFIGURE_ME"
      - entity: "grid_charging_enable"
        value: false
      - entity: "soc_target"
        value: "{{soc_target}}"

  idle:
    description: "Idle / Hold — block discharge, preserve battery"
    actions:
      - entity: "work_mode"
        value: "CONFIGURE_ME"
      - entity: "grid_charging_enable"
        value: false
      - entity: "max_discharge_current"
        value: 0
      - entity: "soc_target"
        value: "{{soc_target}}"

behavior:
  control_unit: "A"
  min_charge_a: 1.0
  round_step_a: 1.0
  write_threshold_a: 5.0
  mode_settling_ms: 100
