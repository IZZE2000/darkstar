metadata:
  name: "fronius"
  version: "1.0.0"
  description: "Fronius Gen24 Inverters (Watts-based)"
  supported_brands: ["Fronius"]
  author: "Darkstar"

capabilities:
  grid_charging_control: true
  watts_based_control: true
  service_call_mode: false
  separate_grid_charging_switch: false
  supports_export_mode: true
  supports_zero_export: true
  supports_self_consumption: true
  supports_soc_target: true
  supports_grid_export_limit: true
  supports_force_discharge: true

entities:
  required:
    work_mode: "select.fronius_battery_mode"
    max_charge_power: "number.fronius_charge_power"
    max_discharge_power: "number.fronius_discharge_power"
    minimum_reserve: "number.fronius_minimum_reserve"
    grid_charge_power: "number.fronius_grid_charge_power"
  optional:
    soc_target: "input_number.master_soc_target"

modes:
  # Export mode - Battery discharges to grid for profit
  export:
    value: "Discharge to grid"
    description: "Force discharge battery to grid (Grid Export)"
    requires_grid_charging: false

  # Zero export mode - Fronius does not appear to have a dedicated zero-export mode select.
  # We map it to Auto (Self consumption) which prioritizes local load.
  zero_export:
    value: null
    description: "Prioritize local load (Note: Fronius handles export via dynamic power limit)"
    requires_grid_charging: false

  # Self-consumption mode - Normal operation
  self_consumption:
    value: "Auto"
    description: "Self-consumption mode (Standard operation)"
    requires_grid_charging: false

  # Hold mode - Block discharging to preserve battery for high price windows
  hold:
    value: "Block discharging"
    description: "Prevent battery from discharging"
    requires_grid_charging: false

  # Grid charging mode - Charge battery from grid
  charge_from_grid:
    value: "Charge from grid"
    description: "Force charge battery from AC grid"
    requires_grid_charging: true

  # Idle/Standby mode - Maintain battery level
  idle:
    value: "Maximum Storage"
    description: "Keep battery at maximum SoC level (Standby)"
    requires_grid_charging: false

behavior:
  control_unit: "W"
  min_charge_w: 500.0
  round_step_w: 100.0
  write_threshold_w: 100.0
  soc_target_is_discharge_floor: true
  soc_target_is_charge_ceiling: true
  requires_mode_settling: true        # Fronius requires delay after mode select
  mode_settling_ms: 500               # 500ms delay for stability

defaults:
  suggested_entities:
    work_mode: "select.fronius_gen24_battery_mode"
    max_charge_power: "number.fronius_gen24_battery_max_charge_power"
    max_discharge_power: "number.fronius_gen24_battery_max_discharge_power"
    minimum_reserve: "number.fronius_gen24_battery_minimum_reserve"
    grid_charge_power: "number.fronius_gen24_battery_grid_charge_power"
  executor:
    control_unit: "W"
  battery:
    max_charge_w: 5000
    max_discharge_w: 5000
