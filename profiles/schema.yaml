# Inverter Profile Schema v2
# This schema defines the v2 structure for inverter profiles in Darkstar.
# Schema Version: 2
#
# HOW TO CREATE A NEW PROFILE:
# 1. Copy an existing v2 profile (e.g., deye.yaml) to your_brand.yaml
# 2. Update metadata (name, description, supported_brands)
# 3. Define your entity registry (entities section)
# 4. Define mode action lists (modes section)
# 5. Set behavior parameters
# 6. Validate using: uv run python -m pytest tests/test_profiles_v2.py

# ==============================================================================
# METADATA - Profile identification and documentation
# ==============================================================================
metadata:
  name: "brand_name"           # Profile identifier (lowercase, matches filename)
  version: "2.0.0"             # Profile version (semantic versioning)
  schema_version: 2            # MUST be 2 for v2 profiles
  description: "Human-readable description of the profile"
  supported_brands:            # List of brand names for UI display
    - "Brand A"
    - "Brand B"

# ==============================================================================
# ENTITIES - Home Assistant entity registry
# ==============================================================================
# Each entry provides default entity ID, domain, category, and metadata.
# Entity resolution order: user override > standard config > profile default

entities:
  # Example entity - work_mode
  work_mode:
    default_entity: "select.inverter_work_mode"  # Default HA entity ID
    domain: "select"                             # HA domain: select, number, switch, input_number
    category: "system"                           # Settings tab: "system" or "battery"
    description: "Inverter operating mode selector"
    required: true                               # True if Darkstar requires this entity

  # Example entity - grid_charging_enable
  grid_charging_enable:
    default_entity: "switch.grid_charging"
    domain: "switch"
    category: "system"
    description: "Grid charging on/off switch"
    required: true

  # Example entity - soc_target
  soc_target:
    default_entity: "number.battery_soc_target"
    domain: "number"
    category: "battery"
    description: "Battery SoC target percentage"
    required: false

  # Example entity - max_charge_power (Watts)
  max_charge_power:
    default_entity: "number.battery_max_charge_power"
    domain: "number"
    category: "battery"
    description: "Maximum battery charging power (Watts)"
    required: true

  # Example entity - max_charge_current (Amps)
  max_charge_current:
    default_entity: "number.battery_max_charge_current"
    domain: "number"
    category: "battery"
    description: "Maximum battery charging current (Amps)"
    required: true

# ==============================================================================
# MODES - Ordered action lists (4 modes only)
# ==============================================================================
# The executor uses exactly 4 mode intents: charge, export, idle, self_consumption
# Each mode defines an ordered list of entity+value actions. Top-to-bottom execution.
# Use dynamic templates: {{charge_value}}, {{discharge_value}}, {{soc_target}},
# {{export_power_w}}, {{max_charge}}, {{max_discharge}}

modes:
  # Charge mode - Force charge battery from AC grid
  charge:
    description: "Grid charge — Force charge battery from AC grid"
    actions:
      - entity: "work_mode"              # References entity registry key
        value: "Forced mode"             # Static value to write
      - entity: "grid_charging_enable"
        value: true
      - entity: "max_charge_power"
        value: "{{charge_value}}"        # Dynamic template
      - entity: "soc_target"
        value: "{{soc_target}}"

  # Export mode - Discharge battery to grid for arbitrage
  export:
    description: "Grid export — Discharge battery to grid for profit"
    actions:
      - entity: "work_mode"
        value: "Export First"
      - entity: "grid_charging_enable"
        value: false
      - entity: "max_discharge_power"
        value: "{{discharge_value}}"

  # Self-consumption mode - Normal PV to battery and house
  self_consumption:
    description: "Self consumption — PV to battery and house, no grid export"
    actions:
      - entity: "work_mode"
        value: "Zero Export To CT"
      - entity: "grid_charging_enable"
        value: false
      - entity: "soc_target"
        value: "{{soc_target}}"

  # Idle mode - Block discharge, preserve battery
  idle:
    description: "Idle / Hold — Block discharge, preserve battery"
    actions:
      - entity: "work_mode"
        value: "Zero Export To CT"
      - entity: "grid_charging_enable"
        value: false
      - entity: "max_discharge_power"
        value: 0
      - entity: "soc_target"
        value: "{{soc_target}}"

# ==============================================================================
# BEHAVIOR - Executor behavior parameters
# ==============================================================================
behavior:
  control_unit: "W"              # "A" (Amps) or "W" (Watts)
  min_charge_a: 1.0             # Minimum charge command (Amps mode)
  min_charge_w: 10.0            # Minimum charge command (Watts mode)
  round_step_a: 1.0             # Rounding step for charge/discharge (Amps)
  round_step_w: 100.0           # Rounding step for charge/discharge (Watts)
  grid_charge_round_step_w: null  # Optional: different rounding for grid charge
  write_threshold_w: 100.0      # Min delta before writing a new value
  mode_settling_ms: 100         # Default delay after mode changes

# ==============================================================================
# ACTION PROPERTIES
# ==============================================================================
# Each action in a mode definition supports these properties:
#
# entity:    (string, required) Key from the entity registry
# value:     (required) Value to write:
#              - Static: "string", 123, true
#              - Dynamic: "{{charge_value}}", "{{discharge_value}}", "{{soc_target}}"
#              - "{{export_power_w}}", "{{max_charge}}", "{{max_discharge}}"
# settle_ms: (integer, optional) Milliseconds to wait AFTER this action completes

# ==============================================================================
# ENTITY RESOLUTION ORDER
# ==============================================================================
# When the executor needs to resolve an entity key to an actual HA entity ID:
# 1. User override: Check executor.inverter.custom_entities[key] in config
# 2. Standard config: Check executor.inverter[key] (for standard entities)
# 3. Profile default: Use entities[key].default_entity from the profile
